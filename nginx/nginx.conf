events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;
    server_tokens off;

    server {
	listen 80;
	server_name finance.guinto.org;
	return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name finance.guinto.org;

        ssl_certificate /etc/letsencrypt/live/finance.guinto.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/finance.guinto.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

	    # Security Headers for Financial Apps
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        # HSTS (Tells browser to only use HTTPS for the next year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Route requests to the frontend service
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js hot reloading
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Route requests to the backend service
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Docling PDF extraction can take several minutes on large files
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }
}
